<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Dashboard</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            background: rgba(108, 99, 255, 0.2);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: #a29bfe;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 24px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .info-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .info-card span {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }
        .btn-primary:hover {
            background: #5a52e0;
        }
        .btn-danger {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff6b6b;
        }
        .btn-danger:hover {
            background: rgba(255, 77, 77, 0.25);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .hidden {
            display: none;
        }
        #logoutMsg {
            color: #69db7c;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome, {{ user }}</h1>
        <span class="badge">Authenticated Session</span>

        <div class="info-card">
            <p>User</p>
            <span>{{ user }}</span>
        </div>

        <div class="info-card" id="sessionInfo">
            <p>Active Sessions</p>
            <span id="activeSessions">---</span>
        </div>

        <div class="info-card">
            <p>API Status</p>
            <span id="apiStatus">Verificando...</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="validateToken()">Validate Token</button>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>

        <p id="logoutMsg" class="hidden"></p>
    </div>

    <script>
        async function fetchMe() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (resp.ok) {
                    document.getElementById('activeSessions').textContent = data.active_sessions;
                }
            } catch {}
        }

        async function validateToken() {
            try {
                const resp = await fetch('/api/validate');
                const data = await resp.json();
                document.getElementById('apiStatus').textContent =
                    data.valid ? 'Valid token' : 'Invalid token';
                document.getElementById('apiStatus').style.color = data.valid ? '#69db7c' : '#ff6b6b';
            } catch {
                document.getElementById('apiStatus').textContent = 'Connection error';
                document.getElementById('apiStatus').style.color = '#ff6b6b';
            }
        }

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                const msg = document.getElementById('logoutMsg');
                msg.classList.remove('hidden');
                msg.textContent = 'Logged out. Redirecting...';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1000);
            } catch {
                window.location.href = '/login';
            }
        }

        fetchMe();
        validateToken();
    </script>
</body>
</html>
